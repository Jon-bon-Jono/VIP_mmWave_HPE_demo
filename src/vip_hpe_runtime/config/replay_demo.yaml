# Edit pickle_path or override it on the ros2 launch command line.
radar_replay_node:
  ros__parameters:
    pickle_path: ""
    radar_topic: "/radar/points"
    status_topic: "/debug/replay_status"
    frame_id: "radar_link"
    start_index: 0
    end_index: -1
    playback_hz: 10.0
    loop: false
    gtrack_filtering: true
    fps_fallback: 10.0

pose_gt_replay_node:
  ros__parameters:
    pickle_path: ""
    pose_topic: "/pose/people"
    frame_id: "radar_link"
    start_index: 0
    end_index: -1
    playback_hz: 10.0
    loop: false
    gtrack_filtering: true
    fps_fallback: 10.0

animated_plot_node:
  ros__parameters:
    radar_topic: "/radar/points"
    pose_topic: "/pose/people"
    redraw_hz: 20.0
    boundless: false
    pc_alpha: 0.1
    require_matching_indices: false
